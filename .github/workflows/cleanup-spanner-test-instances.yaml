name: Cleanup Spanner test instances

on:
  schedule:
    - cron: "0 * * * *" # 毎時実行
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/1050537848145/locations/global/workloadIdentityPools/pool-github-actions/providers/provider-github-actions
          service_account: github-actions@spream.iam.gserviceaccount.com
      - name: Delete test instances older than 1 hour
        run: |
          now=$(date +%s)
          gcloud spanner instances list --project=spream --format="json(name,createTime)" --filter="name:test-" \
          | jq -r '.[] | [.name, .createTime] | @tsv' \
          | while IFS=$'\t' read -r name create_time; do
              created_at=$(date -d "$create_time" +%s)
              age=$(( now - created_at ))
              if [ "$age" -gt 3600 ]; then
                echo "Deleting instance: $name (age: ${age}s)"
                gcloud spanner instances delete "$name" --project=spream --quiet
              else
                echo "Keeping instance: $name (age: ${age}s)"
              fi
            done
